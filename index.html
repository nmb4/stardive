<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STARDIVE | Isometric Data Architecture</title>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('stardive-theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = storedTheme || (prefersDark ? 'dark' : 'light')
          document.documentElement.classList.toggle('dark', theme === 'dark')
        } catch {
          document.documentElement.classList.remove('dark')
        }
      })()
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased selection:bg-zinc-200 selection:text-zinc-950 dark:selection:bg-zinc-700 dark:selection:text-white font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
